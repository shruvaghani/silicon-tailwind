<section class="lg:py-24 md:py-18 py-12 bg-secondary dark:bg-white/4">
    <div class="container mx-auto lg:w-4xl md:w-2xl px-4">
        <h2 class="relative inline-block lg:text-[40px] md:text-[33px] text-[28px] font-extrabold md:mb-10 mb-4 text-center md:text-start">
            Don’t Want to Miss Anything?

                <path d="M53.9527 51.0012c8.396-10.5668 2.0302-26.0134-11.7481-26.7511-.6899-.0646-1.4612.0015-2.1258.0431.1243 9.0462-4.1714 18.8896-11.5618 21.3814-6.6695 2.2133-10.3337-4.2224-7.5813-9.676 3.2966-6.4755 9.103-11.8504 16.1678-13.8189-.5654-5.6953-3.3436-10.7672-9.485-12.48517C17.2678 6.8204 6.49364 16.3681 4.98841 26.127c-.09276 1.0297-1.68569.9497-1.59293-.0801C3.98732 12.9139 19.7395 2.55212 31.9628 8.5787c4.7253 2.3813 7.2649 7.3963 7.9368 13.067 7.4237-.9311 14.5154 3.3683 18.3422 9.5422 4.3988 7.1623 2.3584 15.1401-2.6322 21.1108-.7826.9653-2.3331-.3572-1.6569-1.2975zM26.7754 32.1845c-1.9411 2.2411-4.076 5.0872-4.3542 8.1764-.3036 2.9829 3.7601 3.0525 5.4905 2.7645 2.1568-.3863 3.7221-2.3164 4.8863-4.0419 2.6228-3.6308 4.3657-9.0752 4.4844-14.2563-4.0808 1.279-7.6514 4.2327-10.507 7.3573zm24.6311 25.592c-.7061-2.9738-1.2243-6.1031-1.1591-9.143.0423-1.242 1.767-1.0805 1.8313.1372.1284 2.435.815 4.8532 1.4764 7.1651l4.1619-1.4098c1.0153-.4586 2.4373-1.5714 3.6544-1.1804.6087.1954.7347.7264.6475 1.3068-.2302 1.3976-2.4683 1.9147-3.5901 2.398-1.8429.7619-3.6293 1.2865-5.5477 1.7298-.6391.1476-1.3233-.3665-1.4746-1.0037z" />
            </svg>
        </h2>

        <div class="grid md:grid-cols-12 gap-6 mb-12">
            <div class="md:col-span-3 flex justify-center md:justify-start">
                <h3 class="text-xl font-bold">Sign up for Newsletters</h3>
            </div>

            <div class="md:col-span-9">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" />
                        <span>Daily Newsletter</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" checked />
                        <span>Advertising Updates</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" />
                        <span>Week in Review</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" />
                        <span>Event Updates</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" />
                        <span>Startups Weekly</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="form-checkbox text-primary bg-transparent rounded" />
                        <span>Podcasts</span>
                    </label>
                </div>
            </div>
        </div>

        <form class="flex flex-col md:flex-row gap-4 mb-4" novalidate>
            <div class="relative flex-1">
                <span class="absolute start-3 top-1/2 -translate-y-1/2 text-default-400">
                    <lucide-icon name="mail" class="size-5 text-default-400 dark:text-white/60"></lucide-icon>
                </span>
                <input type="email" placeholder="Your email" required class="w-full ps-12 pe-4 py-3 bg-white dark:bg-transparent rounded-lg border border-default-200 dark:border-white/14 focus:ring-1 focus:ring-primary focus:outline-none" />
            </div>

            <a routerLink="/blog/single" class="w-auto text-center gap-2 px-8 py-3 text-white bg-primary hover:bg-primary-hover transition-all duration-300 font-bold rounded-md">
                Subscribe *
            </a>
        </form>

        <p class="text-sm text-center md:text-start text-default-600">* Yes, I agree to the <a [routerLink]="[]" class="underline text-primary">terms </a>and
            <a [routerLink]="[]" class="underline text-primary"> privacy policy</a>.
        </p>
    </div>
</section>
