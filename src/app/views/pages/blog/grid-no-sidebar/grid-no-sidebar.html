<app-breadcrumb title="Blog Grid no Sidebar" />
<section class="pt-8 lg:pb-24 md:pb-14 pb-12">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 items-center md:gap-0 gap-6 lg:mb-10 mb-7">
            <div class="md:col-span-5 col-span-1">
                <h1 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">Blog Grid</h1>
            </div>

            <div class="md:col-span-7">
                <div class="grid md:grid-cols-12 grid-cols-1 md:gap-6 gap-y-2">
                    <div class="md:col-span-5">
                        <div class="flex items-center gap-6">
                            <div class="flex items-center gap-2">
                                <a routerLink="/blog/list-no-sidebar">
                                    <lucide-icon name="list" class="text-default-800 hover:text-primary transition-all"></lucide-icon>
                                </a>

                                <a routerLink="/blog/grid-no-sidebar">
                                    <lucide-icon name="layout-grid" class="text-primary"></lucide-icon>
                                </a>
                            </div>

                            <select class="w-full rounded-md border border-default-300 dark:border-white/14 dark:text-white/60 dark:bg-dark  bg-transparent ps-4 py-2.5 pe-12 text-sm text-default-600 focus:ring-indigo-500">
                                <option>All categories</option>
                                <option value="processes-and-tools">Processes & Tools</option>
                                <option value="startups">Startups</option>
                                <option value="digital">Digital</option>
                                <option value="strategy">Strategy</option>
                                <option value="business">Business</option>
                            </select>
                        </div>
                    </div>

                    <div class="md:col-span-7">
                        <form class="relative">
                            <input type="text" placeholder="Search the blog..." class="py-2.5 ps-4 pe-12 w-full bg-transparent border-default-300 dark:border-white/14 dark:placeholder:text-white/60 text-sm rounded-md focus:ring-primary">
                            <lucide-icon name="search" class="absolute top-1.5 end-1.5 size-4 text-default-400 dark:text-white/60"></lucide-icon>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
            @for (post of blogPostsData; track $index) {
            <article class="bg-white dark:bg-white/4 rounded-md shadow-custom h-full overflow-hidden">
                <div class="relative">
                    <div class="hs-tooltip [--placement:left] inline-block absolute top-3 end-3">
                        <button type="button" class="hs-tooltip-toggle size-9 inline-flex justify-center items-center gap-2 rounded-full bg-white text-dark">
                            <iconify-icon icon="lucide:bookmark" class="text-lg"></iconify-icon>

                            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-default-900 text-xs font-medium text-default-200 rounded-md shadow-2xs" role="tooltip">
                                Read Later
                            </span>
                        </button>
                    </div>

                    <img [src]="post.image" alt="Image" class="size-full rounded-t-md">
                </div>

                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <a [routerLink]="[]" class="px-2 py-0.5 text-sm font-semibold bg-secondary dark:bg-white/3 text-default-800 rounded">
                            {{ post.category }}
                        </a>

                        <span class="text-sm text-default-500 dark:text-white/60">
                            {{ post.date }}
                        </span>
                    </div>

                    <h3 class="text-xl font-semibold">
                        <a [routerLink]="[]" class="hover:text-primary transition-all font-extrabold">
                            {{ post.title }}
                        </a>
                    </h3>
                </div>

                <div class="py-6 mx-6 border-t border-default-200 dark:border-white/14">
                    <a [routerLink]="[]" class="flex items-center gap-x-3">
                        <img [src]="post.avatar" [alt]="post.author" class="size-12 rounded-full">

                        <div>
                            <h6 class="font-bold">
                                {{ post.author }}
                            </h6>
                        </div>
                    </a>
                </div>
            </article>
            }
        </div>

        <nav class="lg:mt-8 mt-6">
            <ul class="flex justify-center items-cneter md:gap-x-1.5 gap-x-3">
                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        <lucide-icon name="chevron-left" class="size-4"></lucide-icon>
                    </a>
                </li>

                <li class="md:hidden">
                    <span class="flex items-center justify-center text-sm py-2 font-semibold text-default-800">2 / 4</span>
                </li>

                <li class="hidden md:inline">
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        1
                    </a>
                </li>

                <li class="hidden md:inline">
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-white bg-primary  rounded">
                        2
                    </a>
                </li>

                <li class="hidden md:inline">
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        3
                    </a>
                </li>

                <li class="hidden md:inline">
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        4
                    </a>
                </li>

                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        <lucide-icon name="chevron-right" class="size-4"></lucide-icon>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</section>
<blog-cta />
<app-footer />
