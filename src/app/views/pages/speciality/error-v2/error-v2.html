<app-header />
<section class="relative min-h-screen">
    <div class="absolute top-0 start-0 size-full bg-no-repeat bg-center bg-cover dark:hidden bg-[url('assets/img/404/light/bg.jpg')]"></div>
    <div class="hidden dark:block absolute top-0 start-0 size-full bg-no-repeat bg-center bg-cover bg-[url('assets/img/404/dark/bg.jpg')]"></div>
    <div class="container">
        <div class="flex flex-col h-screen items-center relative z-50 pt-14">
            <div class="text-center mt-auto">
                <div class="parallax relative mx-auto max-w-143.5 w-fit h-fit dark:hidden" appParallax [parallaxScale]="5">
                    <div class="parallax-layer absolute inset-0" data-depth="-0.15">
                        <img src="assets/img/404/light/layer01.png" alt="Layer">
                    </div>

                    <div class="parallax-layer absolute inset-0" data-depth="0.12">
                        <img src="assets/img/404/light/layer02.png" alt="Layer">
                    </div>

                    <div class="parallax-layer relative z-10" data-depth="-0.12">
                        <img src="assets/img/404/light/layer03.png" alt="Layer">
                    </div>
                </div>

                <!-- Parallax gfx (Dark version) -->
                <div class="parallax relative mx-auto hidden dark:block  max-w-143.5 w-fit h-fit" appParallax [parallaxScale]="5">
                    <div class="parallax-layer absolute inset-0" data-depth="-0.15">
                        <img src="assets/img/404/dark/layer01.png" alt="Layer">
                    </div>

                    <div class="parallax-layer absolute inset-0" data-depth="0.12">
                        <img src="assets/img/404/dark/layer02.png" alt="Layer">
                    </div>

                    <div class="parallax-layer relative z-10" data-depth="-0.12">
                        <img src="assets/img/404/dark/layer03.png" alt="Layer">
                    </div>
                </div>

                <h1 class="sr-only">404</h1>
                <h2 class="text-3xl md:text-4xl lg:text-5xl font-extrabold my-4">Ooops!</h2>
                <p class="text-xl md:mb-12 mb-10">
                    The page you are looking for is not available.
                </p>
                <div class="md:inline-flex">
                    <a routerLink="/" class="md:w-auto w-full py-3 px-8 bg-primary hover:bg-primary-hover rounded-lg  hover:!shadow-none text-white flex items-center justify-center gap-2 font-semibold transition-all">
                        <lucide-icon name="house" class="size-6 text-white" />Go to homepage
                    </a>
                </div>
            </div>

            <div class="text-center py-6 lg:py-10 mt-auto">
                <p class="text-sm font-normal">
                    © All rights reserved. Made by
                    <a href="{{credits.website}}" target="_blank" rel="noopener" class="font-extrabold hover:text-primary transition-all">Coderthemes</a>
                </p>
            </div>
        </div>
    </div>
</section>
