<app-header />
<section class="mt-19 lg:min-h-screen py-16 bg-[radial-gradient(144.3%_173.7%_at_71.41%_94.26%,rgba(99,102,241,0.1)_0%,rgba(218,70,239,0.05)_32.49%,rgba(241,244,253,0.07)_82.52%)]">
    <div class="container md:pt-0">
        <div class="grid md:grid-cols-2 grid-cols-1 items-center">
            <div class="md:col-span-1 md:order-1 order-2">
                <div class="md:text-start text-center lg:ms-20">
                    <h2 class="lg:text-[80px] md:text-6xl text-[45px] font-extrabold md:mb-6 mb-4">Error 404</h2>
                    <p class="md:mb-14 mb-8 md:text-2xl text-xl lg:w-md md:w-sm">The page you are looking for was moved, removed or might never existed.</p>
                    <div class="md:inline-flex">
                        <a routerLink="/" class="md:w-auto w-full py-3 px-8 bg-primary hover:bg-primary-hover rounded-lg hover:shadow-none text-white flex items-center justify-center gap-2 font-semibold transition-all">
                            <lucide-icon name="house" class="size-6 text-white"></lucide-icon>Go to homepage
                        </a>
                    </div>
                </div>
            </div>

            <div class="md:col-span-1 md:order-2 order-1">
                <div class="flex md:justify-center justify-start md:order-2 order-1 md:-ms-0 -ms-16 md:w-full md:h-full w-sm h-106">
                    @if (isBrowser) {
                    <ng-lottie [options]="options" background="transparent" speed="1" loop autoplay></ng-lottie>
                    }
                </div>
            </div>
        </div>
    </div>

    <div class="container py-12">
        <p class="lg:ms-20 text-sm md:text-start text-center">© All rights reserved. Made by <a [routerLink]="[]" class="font-extrabold hover:text-primary transition-all">Coderthemes</a></p>
    </div>
</section>
