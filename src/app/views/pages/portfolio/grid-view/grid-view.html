<portfolio-breadcrumb title="Portfolio Grid View" />

<section class="lg:pt-10 pb-4 pt-6">
    <div class="container">
        <div class="md:flex justify-between items-center lg:gap-0 md:gap-8 md:mb-8 mb-6">
            <h1 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold text-nowrap md:mb-0 mb-3">Portfolio Grid</h1>
            <div class="overflow-x-auto pb-4">
                <nav class="flex gap-x-1" aria-label="Tabs" role="tablist" aria-orientation="horizontal">
                    @for (tab of portfolioTabs; track $index) {
                    <button type="button" class="font-bold hs-tab-active:border-primary hs-tab-active:text-primary py-4 px-4 inline-flex items-center border-b-1 border-transparent whitespace-nowrap text-default-800 hover:text-primary focus:outline-hidden" [class.active]="tab.selected" [id]="tab.id" [attr.aria-selected]="tab.selected" [attr.data-hs-tab]="'#' + tab.target" [attr.aria-controls]="tab.target" role="tab">
                        {{tab.title}}
                    </button>
                    }
                </nav>
            </div>
        </div>
    </div>
</section>

<section class="lg:pb-24 md:pb-18 pb-12">
    <div class="container">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 pb-6 lg:pb-8">
            @for (item of portfoliosData; track $index) {
            <div [class]="item.colSpan">
                <div class="overflow-hidden group">

                    <div class="overflow-hidden rounded-lg">
                        <img [src]="item.image" alt="Image" class="w-full h-auto group-hover:scale-105 transition duration-300">
                    </div>

                    <div class="py-6">
                        <h2 class="text-xl font-semibold mb-2">
                            <a routerLink="/portfolio/single-project" class="text-default-800 lg:text-2xl text-xl font-extrabold stretched-link transition-all group-hover:text-primary">
                                {{ item.title }}
                            </a>
                        </h2>

                        <span class="md:opacity-0 md:group-hover:opacity-100 transition-all duration-400">
                            {{ item.category }}
                        </span>
                    </div>

                </div>
            </div>
            }

        </div>

        <nav>
            <ul class="flex justify-start items-cneter md:gap-x-1.5 gap-x-3">
                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-white bg-primary  rounded">
                        1
                    </a>
                </li>
                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        2
                    </a>
                </li>
                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        3
                    </a>
                </li>
                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-sm font-semibold text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        4
                    </a>
                </li>

                <li>
                    <a [routerLink]="[]" class="flex items-center justify-center size-9 text-default-800 hover:text-primary hover:bg-secondary dark:hover:bg-white/4 rounded">
                        <lucide-icon name="chevron-right" class="size-4"></lucide-icon>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</section>

<portfolio-cta />
