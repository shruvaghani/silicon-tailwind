<section class="lg:py-24 md:py-10 py-8">
    <div class="container">
        <div class="grid grid-cols-1 lg:grid-cols-4 lg:gap-y-8 gap-y-6">
            <div class="lg:col-span-1">
                <h2 class="lg:text-[33px] md:text-[28px] text-2xl font-extrabold mb-6 lg:text-start text-center">
                    What Our<br class="lg:block hidden">Clients Say<br class="lg:block hidden"> About Us:
                </h2>

                <div class="flex justify-center gap-4 lg:justify-start lg:pt-12 lg:mb-0 mb-4">
                    <button type="button" id="prev-testimonial" aria-label="Previous" class="flex items-center justify-center size-9 rounded-full bg-white dark:bg-white/3 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                        <iconify-icon icon="lucide:chevron-left" class="text-lg font-extrabold"></iconify-icon>
                    </button>

                    <button type="button" id="next-testimonial" aria-label="Next" class="flex items-center justify-center size-9 rounded-full bg-white dark:bg-white/3 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                        <iconify-icon icon="lucide:chevron-right" class="text-lg font-extrabold"></iconify-icon>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="swiper">
                    <swiper-container [config]="swiperConfig" init="false" class="ps-2">
                        @for (item of testimonialData; track $index) {
                        <div class="swiper-slide h-full py-6">
                            <div class="flex flex-col h-full">
                                <div class="relative border-0 shadow-custom bg-white dark:bg-white/4 rounded-lg pt-4 h-full">
                                    <span class="flex items-center justify-center size-11 bg-primary text-white rounded-md absolute top-0 start-3 -translate-y-1/2 ms-4">
                                        <lucide-icon name="quote" fill="white" class="size-5"></lucide-icon>
                                    </span>
                                    <blockquote class="p-6">
                                        <p>
                                            {{ item.quote }}
                                        </p>
                                    </blockquote>
                                    <div class="flex gap-1 mb-4 px-6">
                                        @for (star of [1, 2, 3, 4, 5]; track $index) {
                                        @if (star <= item.rating) { <lucide-icon name="star" class="fill-warning text-warning size-3.5"></lucide-icon>
                                            } @else {
                                            <lucide-icon name="star" class="text-default-400 dark:text-white/60 size-3.5"></lucide-icon>
                                            }
                                            }
                                    </div>
                                </div>

                                <div class="flex gap-4 items-center pt-6">
                                    <img [src]="item.image" class="size-12 rounded-full" [alt]="item.alt" />

                                    <div>
                                        <h6 class="text-sm font-bold">
                                            {{ item.name }}
                                        </h6>

                                        <span class="text-xs text-default-500">
                                            {{ item.designation }}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        }
                    </swiper-container>
                </div>
            </div>
        </div>
    </div>
</section>
