<section class="lg:py-24 md:py-18 py-12">
    <div class="text-center lg:mb-8 md:mb-6 mb-4">
        <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">Our Leaders</h2>
    </div>
    <div class="swiper">
        <swiper-container [config]="swiperConfig" init="false" class="md:mb-10 mb-8">
            @for (member of teamMembersData; track $index) {
            <div class="swiper-slide py-3">
                <div class="bg-body-bg hover:shadow-lg dark:hover:bg-white/4 rounded-md p-6 text-center hover:-translate-y-1.5 transition-all duration-300">
                    <img [src]="member.image" [alt]="member.name" class="size-40.5 mx-auto mb-4 rounded-full">

                    <h5 class="text-lg mb-1 font-semibold">{{ member.name }}</h5>

                    <p class="text-sm mb-4">{{ member.role }}</p>

                    <div class="flex justify-center gap-2">
                        @for (social of member.socials; track $index) {
                        <a [routerLink]="[]" [attr.aria-label]="social.ariaLabel" class="size-9 flex items-center justify-center rounded-md border border-default-300 dark:border-white/14 transition-all" [class]="social.hoverClass">
                            <iconify-icon class="text-lg" [icon]="social.icon"></iconify-icon>
                        </a>
                        }
                    </div>
                </div>
            </div>
            }
        </swiper-container>
        <div id="swiper-pagination" class="swiper-pagination position-relative pt-3 mt-3"></div>
    </div>
</section>
