<section>
    <div class="container">
        <div class="flex items-center justify-between mb-8">
            <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">We are Powerful</h2>
            <a [routerLink]="[]" class="inline-flex md:w-auto text-nowrap gap-2 items-center justify-center px-8 py-3 border border-primary/40 text-primary hover:bg-primary hover:text-white transition-all duration-300 font-semibold rounded-lg">
                <iconify-icon icon="tabler:library-photo" class="font-bold size-6"></iconify-icon>
                See all photos
            </a>
        </div>

        <div class="grid gap-4 md:grid-cols-12 grid-cols-1">

            @if (isBrowser) {
            <lightgallery [settings]="settings" class="contents">

                <!-- Main Video -->
                <div class="md:col-span-5 relative group">
                    <a href="https://www.youtube.com/watch?v=zPo5ZaH6sW8" class="block rounded-lg overflow-hidden">

                        <img src="assets/img/about/gallery/01.jpg" class="rounded-lg w-full h-auto" alt="Gallery thumbnail">

                        <div class="absolute inset-0 bg-black/40 rounded-lg transition">
                            <div class="p-6">
                                <h4 class="text-2xl mb-1 text-white font-extrabold">
                                    Silicon Inc.
                                </h4>

                                <p class="text-white">
                                    Showreel by Marvin McKinney
                                </p>
                            </div>

                            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center w-18 h-18 bg-white rounded-full text-dark group-hover:bg-primary group-hover:text-white group-hover:shadow-[0_2px_8px_#6366f1] transition duration-200">

                                <iconify-icon icon="tabler:player-play-filled" class="text-lg">
                                </iconify-icon>
                            </div>
                        </div>
                    </a>
                </div>

                <!-- Left Images -->
                <div class="md:col-span-3 flex flex-col gap-4">

                    <a href="assets/img/about/gallery/02.jpg" class="relative block rounded-2xl overflow-hidden group">

                        <img src="assets/img/about/gallery/02.jpg" class="w-full h-auto" alt="Gallery thumbnail">

                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition">
                            <div class="p-4">
                                <p class="text-white text-sm font-medium">
                                    Program for apprentices
                                </p>
                            </div>

                            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 scale-20 group-hover:scale-110 transition duration-300">
                                <iconify-icon icon="lucide:zoom-in" class="text-white text-[28px] mb-2">
                                </iconify-icon>
                            </div>
                        </div>
                    </a>

                    <a href="assets/img/about/gallery/03.jpg" class="relative block rounded-2xl overflow-hidden group">

                        <img src="assets/img/about/gallery/03.jpg" class="w-full h-auto" alt="Gallery thumbnail">

                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition">
                            <div class="p-4">
                                <p class="text-white text-sm font-medium">
                                    Modern bright offices
                                </p>
                            </div>

                            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 scale-20 group-hover:scale-110 transition duration-300">
                                <iconify-icon icon="lucide:zoom-in" class="text-white text-[28px] mb-2">
                                </iconify-icon>
                            </div>
                        </div>
                    </a>

                </div>

                <!-- Right Images -->
                <div class="md:col-span-4 flex flex-col gap-4">

                    <a href="assets/img/about/gallery/04.jpg" class="relative block rounded-2xl overflow-hidden group">

                        <img src="assets/img/about/gallery/04.jpg" class="w-full h-auto" alt="Gallery thumbnail">

                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition">
                            <div class="p-4">
                                <p class="text-white text-sm font-medium">
                                    Friendly professional team
                                </p>
                            </div>

                            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 scale-20 group-hover:scale-110 transition duration-300">
                                <iconify-icon icon="lucide:zoom-in" class="text-white text-[28px] mb-2">
                                </iconify-icon>
                            </div>
                        </div>
                    </a>

                    <a href="assets/img/about/gallery/05.jpg" class="relative block rounded-2xl overflow-hidden group">

                        <img src="assets/img/about/gallery/05.jpg" class="w-full h-auto" alt="Gallery thumbnail">
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition">
                            <div class="p-4">
                                <p class="text-white text-sm font-medium">
                                    Efficient project management
                                </p>
                            </div>

                            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 scale-20 group-hover:scale-110 transition duration-300">
                                <iconify-icon icon="lucide:zoom-in" class="text-white text-[28px] mb-2">
                                </iconify-icon>
                            </div>
                        </div>
                    </a>
                </div>
            </lightgallery>
            }

        </div>
    </div>
</section>
