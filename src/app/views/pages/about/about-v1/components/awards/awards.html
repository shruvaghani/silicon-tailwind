<section>
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 gap-6">
            <div class="md:col-span-5 md:text-start text-center">
                <h2 class="lg:text-[33px] md:text-[28px] text-2xl font-extrabold">Award-winning designs featured by</h2>
            </div>

            <div class="md:col-span-7">
                <div class="grid md:grid-cols-4 grid-cols-2 md:gap-0 gap-6">
                    @for(item of awardsData; track $index){
                    <div class="text-center">
                        <img [src]="item.image" alt="" class="mx-auto w-25 mb-4">
                        <a [routerLink]="[]" class="text-sm">{{item.title}}</a>
                    </div>
                    }                    
                </div>
            </div>
        </div>
    </div>
</section>
