<section class="lg:pb-24 md:pb-14 pb-10">
    <div class="container">
        <div class="text-center lg:mb-10 mb-7">
            <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold md:mb-0 mb-4">Our Leadership</h2>
        </div>

        <div class="grid lg:grid-cols-4 md:grid-cols-3 gap-6">
            @for (member of teamMembersData; track $index) {
            <div class="w-full group">
                <div class="relative rounded-md overflow-hidden shadow-custom">
                    <img [src]="member.image" [alt]="member.name" class="w-full h-auto object-cover rounded-md">

                    <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                        <div class="flex gap-x-3">

                            @for (social of member.socials; track $index) {
                            <a [routerLink]="[]" class="bg-white rounded size-9 shadow transition-all flex items-center justify-center text-default-600 hover:text-white" [ngClass]="social.hoverClass">
                                <iconify-icon [icon]="social.icon" class="text-lg"></iconify-icon>
                            </a>
                            }

                        </div>
                    </div>
                </div>

                <div class="text-center p-4">
                    <h3 class="text-lg mb-2 font-extrabold">
                        {{ member.name }}
                    </h3>

                    <p class="text-sm font-normal mb-2">
                        {{ member.role }}
                    </p>
                </div>
            </div>
            }
        </div>
    </div>
</section>
