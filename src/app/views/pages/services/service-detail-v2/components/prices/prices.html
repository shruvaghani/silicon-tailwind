<section class="lg:py-24 md:py-18 py-12">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 lg:gap-0 gap-6">
            <div class="md:col-span-5">
                <div class="lg:text-start text-center lg:w-sm md:mb-0 mb-8">
                    <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold lg:mb-6 mb-4">Our prices for best results</h2>
                    <p class="lg:mb-10 mb-6">Nisi augue at ridiculus ullamcorper ibendum nunc dignissim habitasse in mollis orci. Elementum duis ultricies vehicula nullam tristique.</p>
                    <a [routerLink]="[]" class="text-white font-semibold transition-all px-8 py-3 rounded-md  bg-primary hover:bg-primary-hover hover:shadow-none">
                        Make an appointment
                    </a>
                </div>
            </div>
            <div class="md:col-span-7">
                <div class="bg-secondary dark:bg-white/4 rounded-xl py-6 md:px-10 px-6">

                    @for (item of pricingData; track $index) {
                    <div class="flex justify-between items-center" [ngClass]="{
                'border-b border-default-200 dark:border-white/14 pb-6 mb-4': !$last
            }">
                        <span class="text-xl font-medium">{{ item.title }}</span>
                        <span>
                            from
                            <span class="text-xl text-default-800 font-extrabold ms-1 text-end text-nowrap">
                                {{ item.price }}
                            </span>
                        </span>
                    </div>
                    }

                </div>
            </div>
        </div>
    </div>
</section>
