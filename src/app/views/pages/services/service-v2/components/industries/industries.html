<section class="lg:pt-24 md:pt-16 pt-14">
    <div class="container">
        <div class="text-center lg:mb-10 mb-8">
            <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">Industries We Serve</h2>
        </div>

        <nav class="flex gap-x-3 justify-center overflow-auto pb-2 mb-8" role="tablist">
            @for (item of industriesData; track $index) {
            <button type="button" class="hs-tab-active:bg-primary inline-flex bg-secondary dark:bg-white/3 hover:bg-secondary dark:hover:bg-primary/12 hover:text-primary hs-tab-active:text-white font-bold px-4 py-2 rounded-md items-center gap-x-2 text-default-600 dark:text-white/80 transition-all whitespace-nowrap" [class.active]="item.active" [id]="item.id + '-tab'" [attr.data-hs-tab]="'#' + item.id" [attr.aria-controls]="item.id" [attr.aria-selected]="item.active ? 'true' : 'false'">
                <lucide-icon [name]="item.icon" class="size-5 opacity-60"></lucide-icon>
                {{ item.title }}
            </button>
            }
        </nav>

        <div>
            @for (item of industriesData; track $index) {
            <div [id]="item.id" [class.hidden]="!item.active" role="tabpanel" [attr.aria-labelledby]="item.id + '-tab'">
                <div class="grid grid-cols-1 md:grid-cols-12 md:gap-8 gap-5 items-center bg-secondary dark:bg-white/3 rounded-lg lg:py-8 py-6 lg:px-0 px-6">

                    <div class="md:col-span-5 lg:col-span-4 lg:col-start-2 text-center md:text-start">
                        <h3 class="lg:text-[28px] text-2xl mb-4 lg:mb-6 font-extrabold">
                            {{ item.title }}
                        </h3>

                        <p>
                            {{ item.description }}
                        </p>
                    </div>

                    <div class="md:col-span-7 lg:col-span-6">
                        <img [src]="item.image" [alt]="item.title" class="block md:ms-auto" [class]="[item.imageWidthClass, item.imageMarginClass]">
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</section>
