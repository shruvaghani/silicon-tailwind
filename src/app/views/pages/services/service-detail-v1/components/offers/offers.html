<section class="overflow-hidden lg:py-24 md:py-18 py-12">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 md:gap-0 gap-y-10">
            <div class="md:col-span-7">
                <div class="md:max-w-165">
                    <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold mb-8">
                        What We Offer
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-10">
                        @for (item of offersData; track $index) {
                        <div>
                            <lucide-icon [name]="item.icon" class="size-8 text-primary mb-4"></lucide-icon>
                            <h3 class="text-xl font-extrabold mb-3">{{ item.title }}</h3>
                            <p>{{ item.description }}</p>
                        </div>
                        }
                    </div>
                </div>
            </div>

            <div class="md:col-span-5 md:absolute lg:end-0 md:-end-140">
                <img src="assets/img/services/single/dashboard.png" alt="Dashboard" class="w-210">
            </div>
        </div>
    </div>
</section>
