<section class="lg:py-10">
    <div class="text-center lg:mb-8 mb-6">
        <h2 class="lg:text-[33px] md:text-[28px] text-2xl font-extrabold">Trusted by Leading Companies</h2>
    </div>
    <div class="container">
        <div class="swiper">
            <swiper-container [config]="swiperConfig" init="false" class="mb-10">
                @for (brand of brandsData; track $index) {
                <div class="swiper-slide py-3">
                    <a [routerLink]="[]" class="rounded-lg border border-default-200 dark:border-white/14 dark:hover:bg-white/4 dark:hover:border-white/30 bg-transparent py-8 px-3 hover:transform hover:-translate-y-1.5 transition-all duration-300 hover:shadow-md flex justify-center items-center">
                        <img [src]="brand" class="w-38.5" alt="brand">
                    </a>
                </div>
                }
            </swiper-container>
            <div class="swiper-pagination position-relative pt-2 mt-4"></div>
        </div>
    </div>
</section>
