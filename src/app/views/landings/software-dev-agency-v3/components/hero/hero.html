<section class="relative flex items-center min-h-screen py-5 bg-dark overflow-hidden">
    <span class="absolute inset-0 hidden dark:block size-full"></span>
    <div class="relative container mx-auto lg:mt-8 mt-24 mb-3 md:mb-4 lg:mb-5 text-white">
        <div class="grid grid-cols-1 lg:grid-cols-12 md:gap-y-20 gap-y-16 lg:gap-x-6">
            <div class="lg:col-span-5 md:col-span-6 text-center lg:text-start relative z-10">
                <h1 class="text-4xl md:text-[56px] lg:text-7xl font-bold lg:mb-10 md:mb-8 mb-6 text-white">
                    Top <span class="text-primary">software</span> engineering company
                </h1>

                <p class="lg:mb-10 md:mb-8 mb-6 flex flex-wrap justify-center lg:justify-start items-center">
                    <span class="me-2">We are the Top Rated agency on</span>
                    <img src="assets/img/landing/software-agency-3/clutch-rating.png" class="w-48" alt="Clutch rating">
                </p>

                <a [routerLink]="[]" class="inline-block w-auto text-center bg-primary text-white py-3.5 px-8 font-medium rounded-lg transition-all hover:bg-primary-hover">Start your project</a>
            </div>

            <div class="lg:col-span-7 md:col-span-6 flex lg:justify-end justify-center relative">
                <div class="relative lg:ms-4">
                    <div class="absolute top-1/2 start-1/2 -translate-x-1/2 -translate-y-1/2 aspect-square w-[125%] max-w-199">
                        <div class="p-5 md:p-0">
                            <img src="assets/img/landing/software-agency-3/hero-bg.png" alt="Shape" class="animate-[spin-slow_60s_linear_infinite] p-5 md:p-0">
                        </div>
                    </div>

                    <div class="relative grid grid-cols-2 gap-3 md:gap-4 lg:gap-6">
                        <div class="space-y-2 md:space-y-4 lg:space-y-6 flex flex-col">
                            <div class="col-span-1">
                                <div class="flex items-center justify-center bg-white/4 rounded-xl md:w-xs ms-auto min-h-44 backdrop-blur-md">
                                    <div class="text-center font-semibold text-xl md:p-6">
                                        <span class="text-white animate-[hero-fade_4s_ease-in_infinite]">I need AI engineers</span>
                                    </div>
                                </div>
                            </div>

                            <div class="col-span-1">
                                <div class="flex items-center justify-center bg-white/4 rounded-xl md:w-xs ms-auto min-h-44 backdrop-blur-md">
                                    <div class="text-center font-semibold text-xl md:p-6">
                                        <span class="text-white animate-[hero-fade_4s_ease-in_infinite] delay-[1.5s]">We are looking for Shopify Experts</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="md:mt-12 pt-0 flex flex-col space-y-2 md:space-y-4 lg:space-y-6">
                            <div class="col-span-1">
                                <div class="flex items-center justify-center bg-white/4 rounded-xl md:w-xs ms-auto min-h-44 backdrop-blur-md">
                                    <div class="text-center font-semibold text-xl md:p-6">
                                        <span class="text-white animate-[hero-fade_4s_ease-in_infinite] delay-[-75s]">I need MVP for startup</span>
                                    </div>
                                </div>
                            </div>

                            <div class="col-span-1">
                                <div class="flex items-center justify-center bg-white/4 rounded-xl md:w-xs ms-auto min-h-44 backdrop-blur-md">
                                    <div class="text-center font-semibold text-xl md:p-6">
                                        <span class="text-white animate-[hero-fade_4s_ease-in_infinite] delay-[2s]">I need web development</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
