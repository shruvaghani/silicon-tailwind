<section class="lg:py-24 md:py-18 py-12">
  <div class="container">
    <div class="grid md:grid-cols-12 grid-cols-1 lg:gap-x-10 gap-x-6 gap-y-6">
      <div class="lg:col-span-4 md:col-span-5">
        <div class="flex flex-col md:gap-y-8 gap-y-5 md:text-start text-center">
          <h2 class="lg:text-[33px] md:text-[28px] text-2xl font-extrabold">
            Any questions? Check out the FAQs
          </h2>

          <p class="text-lg text-default-700">
            Still have unanswered questions and need to get in touch?
          </p>

          <div
            class="grid grid-cols-1 md:justify-start justify-center md:grid-cols-2 gap-3 md:gap-4"
          >
            @for (item of supportCardData; track $index) {
              <div
                class="rounded-lg border border-default-200 dark:border-white/14 dark:hover:bg-white/4 dark:hover:border-white/30 bg-transparent group hover:transform hover:-translate-y-1.5 hover:shadow-md transition duration-200"
              >
                <div class="p-6">
                  <lucide-icon [name]="item.iconName" class="mb-3.5 md:mx-0 mx-auto" [class]="item.iconClass"></lucide-icon>

                  <p class="text-sm font-medium mb-4">
                    {{ item.title }}
                  </p>

                  <a [routerLink]="[]" [class]="item.buttonClass" class="inline-flex gap-2 items-center rounded-lg  text-sm font-bold">
                    {{ item.buttonText }}

                    <lucide-icon name="arrow-right" class="font-bold size-4">
                    </lucide-icon>
                  </a>
                </div>
              </div>
            }
          </div>
        </div>
      </div>

      <div class="lg:col-span-8 md:col-span-7 lg:ms-auto lg:w-3xl">
        <div class="hs-accordion-group flex flex-col gap-y-4">
          @for (item of faqData; track $index) {
            <div
              class="hs-accordion bg-transparent dark:bg-white/5 shadow-custom rounded-lg"
              [id]="item.headingId"
            >
              <button
                class="hs-accordion-toggle py-4 px-6 inline-flex items-center text-default-900 font-bold justify-between gap-x-3 w-full text-start"
                aria-expanded="true"
                [attr.aria-controls]="item.id"
              >
                {{ item.question }}

                <div>
                  <div
                    class="flex items-center justify-center size-9 rounded-full bg-secondary dark:bg-white/3 hs-accordion-active:bg-primary hs-accordion-active:text-white hs-accordion-active:shadow-[0_0.5rem_1.125rem_-0.5rem_rgba(99,102,241,0.9)] transition-all duration-300"
                  >
                    <iconify-icon
                      icon="lucide:chevron-down"
                      class="text-lg font-extrabold hs-accordion-active:hidden block"
                      width="16"
                      height="16"
                    ></iconify-icon>

                    <iconify-icon
                      icon="lucide:chevron-up"
                      class="text-lg font-extrabold hs-accordion-active:block hidden"
                      width="16"
                      height="16"
                    ></iconify-icon>
                  </div>
                </div>
              </button>

              <div
                [id]="item.id"
                class="hs-accordion-content hidden text-sm w-full overflow-hidden transition-[height] duration-300"
                role="region"
                [attr.aria-labelledby]="item.headingId"
              >
                <div class="px-6 pb-4">
                  <p class="mb-5">
                    {{ item.firstParagraph }}
                  </p>

                  <p>
                    {{ item.secondParagraph }}
                  </p>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
