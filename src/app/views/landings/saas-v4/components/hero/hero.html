<section class="lg:py-24 md:py-12 pt-10 bg-secondary dark:bg-white/3 relative">
    <div class="container lg:pt-24 pt-22">
        <div class="grid md:grid-cols-12 md:gap-0 gap-12">
            <div class="lg:col-span-5 md:col-span-6">
                <div class="md:text-start text-center">
                    <h1 class="lg:text-[56px] md:text-[45px] text-[33px] font-extrabold lg:mb-6 mb-4">Keep your finances even more easily.</h1>
                    <p class="text-lg lg:mb-10 mb-6">Here you can manage and monitor your finances much more conveniently with the help of the new application that we have created.</p>
                    <a [routerLink]="[]" class="inline-block bg-primary text-white py-3.5 px-8 font-bold hover:shadow-none rounded-md transition-all hover:bg-primary-hover">Digitize Now</a>
                </div>

                <ul class="grid grid-cols-2 gap-y-2 md:w-94 lg:mt-48 md:mt-18 mt-12">
                    @for (item of financeData; track $index) {

                    <li class="flex items-center gap-2">
                        <iconify-icon [icon]="item.icon" class="text-xl text-primary"></iconify-icon>
                        {{ item.title }}
                    </li>

                    }
                </ul>
            </div>

            <div class="lg:col-span-7 md:col-span-6 md:absolute lg:-end-70 lg:top-52 md:top-70 md:-end-80 -mb-10">
                <div class="md:self-end p-2 md:p-4 lg:p-6 rounded-2xl overflow-hidden z-20 bg-[linear-gradient(153.32deg,rgba(255,255,255,0.3)_-65.62%,rgba(255,255,255,0.1)_83.28%)] shadow-[0_4px_24px_-1px_rgba(0,0,0,0.2)] backdrop-blur-6">
                    <img src="assets/img/landing/saas-4/hero-img.jpg" alt="Layer" class="rounded-2xl shadow-[0_0_120px_rgba(0,0,0,0.1)] lg:w-280 md:w-162">
                </div>
            </div>
        </div>
    </div>
</section>
