<section class="relative overflow-hidden mt-20">
    <span class="absolute inset-0 bg-dark opacity-70 z-10"></span>
    <div class="container relative z-10 pb-10">
        <nav class="py-10" aria-label="breadcrumb">
            <ol class="flex flex-wrap items-center gap-2 text-white text-sm">
                <li>
                    <a routerLink="/" class="flex items-center gap-1">
                        <lucide-icon name="house" class="size-4.5 text-white/80 hover:text-white"></lucide-icon> Home
                    </a>
                </li>
                <lucide-icon name="chevrons-right" class="size-4 text-white/80"></lucide-icon>
                <li class="text-white font-semibold">Blog Homepage</li>
            </ol>
        </nav>

        <div class="grid grid-cols-12 gap-8 lg:py-18 md:py-12 mb-12">
            <div class="col-span-12 md:col-span-7 lg:col-span-6 text-white">
                <div class="mb-4 flex items-center gap-2 text-lg">
                    <img src="assets/img/blog/flame.svg" class="w-6" alt="flame">
                    Hot Topic
                </div>
                <h1 class="lg:text-5xl md:text-[40px] text-3xl font-extrabold md:mb-8 mb-4 text-white">
                    This Long-Awaited Technology May Finally Change the World
                </h1>

                <div class="flex flex-wrap items-center gap-4 text-sm text-white/80 md:mb-14 mb-6">
                    <span class="border-e border-white/40 pe-4">
                        <span class="bg-white/20 text-white px-2.5 py-1 rounded">Technology</span>
                    </span>

                    <span class="border-r border-white/40 text-white/60 pe-4">12 hours ago</span>
                    <div class="flex items-center gap-4 text-sm text-white/60 md:mt-0 mt-4">
                        <div class="flex items-center gap-1">
                            <lucide-icon name="thumbs-up" class="size-4"></lucide-icon>
                            <span>8</span>
                        </div>

                        <div class="flex items-center gap-1">
                            <lucide-icon name="message-square" class="size-4"></lucide-icon>
                            <span>7</span>
                        </div>

                        <div class="flex items-center gap-1">
                            <lucide-icon name="share-2" class="size-4"></lucide-icon>
                            <span>4</span>
                        </div>
                    </div>
                </div>

                <a routerLink="/blog/single" class="inline-flex w-auto justify-center gap-2 items-center px-7 py-3 text-white bg-primary hover:bg-primary-hover transition-all duration-300 font-bold rounded-md">
                    Read article
                    <iconify-icon icon="tabler:arrow-right" class="font-bold size-4"></iconify-icon>
                </a>
            </div>

            <div class="col-span-12 md:col-span-5 lg:col-span-4 lg:col-start-9">
                <div class="swiper h-102.5 overflow-hidden" >
                    <swiper-container [config]="swiperConfig" init="false" class="swiper-wrapper">
                        @for (item of blogData; track $index) {
                        <swiper-slide>
                            <article class="bg-white/4 hover:bg-primary rounded-md shadow-custom p-6 group transition">

                                <div class="flex items-center justify-between mb-4">
                                    <a [routerLink]="[]" class="px-2 py-0.5 text-sm font-semibold bg-white text-default-500 rounded">
                                        {{ item.category }}
                                    </a>

                                    <span class="text-sm text-white/60">
                                        {{ item.date }}
                                    </span>
                                </div>

                                <h3 class="text-base font-semibold">
                                    <a [routerLink]="item.link" class="text-xl font-bold text-white">
                                        {{ item.title }}
                                    </a>
                                </h3>

                                <div class="flex items-center gap-4 text-sm text-white/60 mt-6">

                                    <div class="flex items-center gap-1">
                                        <lucide-icon name="thumbs-up" class="size-4"></lucide-icon>
                                        <span>{{ item.likes }}</span>
                                    </div>

                                    <div class="flex items-center gap-1">
                                        <lucide-icon name="message-square" class="size-4"></lucide-icon>
                                        <span>{{ item.comments }}</span>
                                    </div>

                                    <div class="flex items-center gap-1">
                                        <lucide-icon name="share-2" class="size-4"></lucide-icon>
                                        <span>{{ item.shares }}</span>
                                    </div>

                                </div>

                            </article>
                        </swiper-slide>

                        }

                    </swiper-container>
                    <div class="swiper-scrollbar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="absolute inset-0 -z-10">
        <img src="assets/img/blog/single/cover-image.jpg" alt="cover" class="size-full object-cover object-center">
    </div>
</section>
