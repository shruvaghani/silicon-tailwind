<section class="lg:pb-24 md:pb-18 pb-12">
    <div class="container">
        <div class="flex flex-col lg:gap-y-12 gap-y-6">
            <div class="text-center lg:w-3xl md:w-xl mx-auto">
                <h1 class="mb-6 lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">Integrate Top Work Tools</h1>
                <p class="text-lg">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Proin volutpat mollis egestas. Nam luctus facilisis ultrices. Pellentesque volutpat ligula est. Mattis fermentum, at nec lacus.</p>
            </div>

            <div class="grid lg:grid-cols-4 md:grid-cols-3 gird-cols-1 lg:gap-6 md:gap-4 gap-2">
                @for (item of brandItemsData; track $index) {
                <div class="bg-transparent rounded-lg p-6 hover:shadow-lg hover:-translate-y-1 dark:hover:bg-white/4 transition duration-300">
                    <img [src]="item.image" class="block mb-6 w-14" [alt]="item.alt">
                    <p>{{ item.description }}</p>
                </div>
                }
            </div>
        </div>
    </div>
</section>
