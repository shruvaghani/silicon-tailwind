<section class="lg:px-0 md:px-4 px-3">
    <div class="container rounded-lg bg-secondary dark:bg-white/3 lg:py-14 md:py-12 md:ps-6 md:pe-12 py-12 px-6">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-y-8 items-center">
            <div class="md:col-span-7 lg:col-span-6">
                <div class="relative lg:mx-auto md:mx-0 mx-auto max-w-131.5">
                    <img src="assets/img/landing/saas-2/device.png" alt="Device" class="lg:ms-10 md:ms-0 block">
                    <div class="absolute top-0 lg:end-4 md:end-30 w-full" data-rellax-percentage="0.5" data-rellax-vertical-scroll-axis="xy" data-rellax-horizontal-speed="0.6" data-rellax-vertical-speed="-0.6" data-disable-parallax-down="md">
                        <img src="assets/img/landing/saas-2/screen.png" alt="App Screen" class="block">
                    </div>
                </div>
            </div>

            <div class="md:col-span-5 lg:col-span-6 lg:w-sm lg:mx-auto">
                <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold lg:mb-12 mb-6 md:text-start text-center">Download Our App for Any Devices:</h2>

                <div class="flex-col lg:gap-y-12 gap-y-6 flex md:gap-x-0">

                    @for (item of storeData; track $index) {
                    <div class="grid grid-cols-1 lg:grid-cols-2 items-end">
                        <div class="md:text-start text-center">
                            <h3 class="font-normal opacity-60 mb-2"> {{ item.platform }}</h3>
                            <div class="flex items-center gap-1 whitespace-nowrap mb-3">
                                @for (star of [1, 2, 3, 4, 5]; track $index) {
                                <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                                }
                            </div>

                            <h4 class="mb-1 md:text-2xl text-xl font-extrabold">{{ item.title }}</h4>
                            <p>
                                rating {{ item.rating }}, {{ item.reviews }} reviews
                            </p>
                        </div>

                        <div class="inline-flex lg:mt-0 mt-4 lg:justify-center md:justify-start justify-center">
                            <a [routerLink]="[]" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-6 py-2 flex items-center justify-center">
                                <img [src]="item.lightIcon" class="block dark:hidden" [class]="$last ? 'w-34' : 'w-31'" alt="App Store">
                                <img [src]="item.darkIcon" class="hidden dark:block" [class]="$last ? 'w-34' : 'w-31'" alt="App Store">
                            </a>
                        </div>
                    </div>
                    }

                </div>
            </div>
        </div>
    </div>
</section>
