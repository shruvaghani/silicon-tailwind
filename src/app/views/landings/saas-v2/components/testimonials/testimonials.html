<section class="lg:py-24 md:py-16 py-12">
    <div class="container">
        <div class="grid grid-cols-1 md:grid-cols-12 md:gap-y-7 gap-y-2">
            <div class="lg:col-span-3 col-span-4">
                <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold mb-6 md:text-start text-center">
                    What<br class="hidden md:block">People Say<br>About App:
                </h2>

                <div class="md:flex justify-center gap-4 md:justify-start lg:pt-12 hidden">
                    <button type="button" id="prev-testimonial" aria-label="Previous" class="flex items-center justify-center size-9 rounded-full bg-white dark:bg-white/3 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                        <iconify-icon icon="lucide:chevron-left" class="text-lg font-extrabold"></iconify-icon>
                    </button>

                    <button type="button" id="next-testimonial" aria-label="Next" class="flex items-center justify-center size-9 rounded-full bg-white dark:bg-white/3 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                        <iconify-icon icon="lucide:chevron-right" class="text-lg font-extrabold"></iconify-icon>
                    </button>
                </div>
            </div>

            <div class="lg:col-span-9 col-span-8">
                <div class="swiper">
                    <swiper-container [config]="swiperConfig" init="false" class="swiper-wrapper">
                        @for (item of testimonialsData; track $index) {
                        <swiper-slide class="h-full py-6 ps-2 mb-4">
                            <div class="flex flex-col h-full">

                                <div class="relative border-0 shadow-lg bg-white dark:bg-white/4 rounded-lg pt-4 h-full">

                                    <span class="flex items-center justify-center size-11 bg-primary text-white rounded-md shadow-custom absolute top-0 start-3 -translate-y-1/2 ms-4">
                                        <lucide-icon name="quote" fill="white" class="size-5"></lucide-icon>
                                    </span>

                                    <blockquote class="p-6">
                                        <p>
                                            {{ item.quote }}
                                        </p>
                                    </blockquote>

                                    <div class="flex items-center gap-1 whitespace-nowrap mb-4 px-6">
                                        @for (star of [1, 2, 3, 4, 5]; track $index) {
                                        @if (star <= item.rating) { <lucide-icon name="star" class="fill-warning text-warning size-4"></lucide-icon>
                                            } @else {
                                            <lucide-icon name="star" class="text-default-400 dark:text-white/60 size-4"></lucide-icon>
                                            }
                                            }
                                    </div>

                                </div>

                                <div class="flex gap-4 items-center pt-6 ps-6">
                                    <img [src]="item.image" class="size-12 rounded-full" [alt]="item.name">

                                    <div>
                                        <h6 class="text-sm font-semibold">
                                            {{ item.name }}
                                        </h6>

                                        <span class="text-xs text-default-500 dark:text-white/60">
                                            {{ item.role }}
                                        </span>
                                    </div>
                                </div>

                            </div>
                        </swiper-slide>

                        }
                    </swiper-container>
                    <div id="testimonials-pagination" class="swiper-pagination relative md:hidden block mt-5"></div>
                </div>
            </div>
        </div>
    </div>
</section>
