<section class="lg:py-24 md:py-18 py-12 dark:bg-white/5">
    <div class="container">
        <div class="text-center lg:w-2xl md:w-lg mx-auto lg:mb-12 md:mb-6 mb-8">
            <h2 class="lg:text-[40px] md:text-[33px] text-[28px] lg:mb-6 mb-4 font-extrabold">What Do You Get with Our Tool?</h2>
            <p class="text-lg">Make sure all your tasks are organized so you can set the priorities and focus on important.</p>
        </div>

        @for (row of featuresData; track $index) {

        <div class="grid md:grid-cols-3 grid-cols-1 md:gap-6 gap-4">

            @for (item of row; track $index) {
            <div>
                <div class="bg-secondary dark:bg-white/4 size-18 flex justify-center items-center rounded-lg mx-auto">
                    <img [src]="item.image" class="w-10" [alt]="item.alt">
                </div>

                <div class="text-center p-6">
                    <h3 class="text-xl font-extrabold mb-3 text-default-900">
                        {{ item.title }}
                    </h3>

                    <p>
                        {{ item.description }}
                    </p>
                </div>
            </div>
            }

        </div>

        @if (!$last) {
        <hr class="border-default-200 dark:border-white/14 lg:mt-4 mt-1 lg:mb-10 mb-7 md:block hidden">
        }
        }
    </div>
</section>
