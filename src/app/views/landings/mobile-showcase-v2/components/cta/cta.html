<section class="lg:pt-24 md:pt-16 pt-12 bg-secondary dark:bg-white/3">
    <div class="container">
        <div class="grid md:grid-cols-12 items-center">
            <div class="lg:col-span-4 md:col-span-5 lg:pb-24 md:pb-16 pb-12">
                <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold mb-12 md:text-start text-center">Download Our App for Any Devices:</h2>
                <div class="md:flex-col gap-y-12 flex md:gap-x-0 gap-x-4">

                    @for (item of storeData; track $index) {

                    <div class="grid grid-cols-1 lg:grid-cols-2 items-end">
                        <div class="md:text-start text-center">
                            <h3 class="font-normal opacity-60 mb-2">
                                {{ item.title }}
                            </h3>
                            <div class="flex items-center gap-1 whitespace-nowrap mb-3">
                                @for (star of [1,2,3,4,5]; track $index) {
                                <lucide-icon name="star" class="fill-warning text-warning size-4">
                                </lucide-icon>
                                }
                            </div>

                            <h4 class="mb-1 md:text-2xl text-xl font-extrabold">
                                {{ item.heading }}
                            </h4>

                            <p>{{ item.ratingText }}</p>

                        </div>

                        <div class="inline-flex lg:mt-0 mt-4 lg:justify-center">
                            <a [routerLink]="[]" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-6 py-2 flex items-center justify-center">

                                <img [src]="item.lightImg" class="block dark:hidden" [class]="item.imgClass" [alt]="item.title">

                                <img [src]="item.darkImg" class="hidden dark:block" [class]="item.imgClass" [alt]="item.title">
                            </a>
                        </div>
                    </div>
                    }
                </div>
            </div>

            <div class="lg:col-span-8 md:col-span-7 lg:overflow-hidden md:overflow-visible overflow-hidden h-full">
                <div class="relative">
                    <img src="assets/img/landing/app-showcase-2/devices.png" class="lg:w-154.5 md:w-84 w-94 block mx-auto" alt="Devices" />
                    <div class="hidden lg:block -mb-112.5"></div>
                    <div class="hidden md:block lg:hidden -mb-200"></div>
                    <div class="block md:hidden -mb-60"></div>
                </div>
            </div>
        </div>
    </div>
</section>
