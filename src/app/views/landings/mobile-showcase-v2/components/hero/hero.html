<section class="md:py-24 py-18">
    <div class="container">
        <div class="grid grid-cols-1 md:grid-cols-2 items-center gap-x-10 gap-y-8">
            <div class="flex justify-center md:justify-end overflow-hidden order-1 md:order-2">
                <div class="relative mt-5 max-w-165">
                    <div class="bg-gradient-to-r from-indigo-500 via-violet-500 to-fuchsia-500 absolute start-0 bottom-0 w-full rounded-lg opacity-15 h-[95%]"></div>

                    <div class="parallax z-20" appParallax [parallaxScale]="5" >
                        <div class="parallax-layer z-20 -mb-3" data-depth="0.1">
                            <img src="assets/img/landing/app-showcase-2/hero/layer01.png" alt="Device">
                        </div>
                        <div class="parallax-layer" data-depth="-0.22">
                            <img src="assets/img/landing/app-showcase-2/hero/layer02.png" alt="Bubble">
                        </div>
                        <div class="parallax-layer" data-depth="0.3">
                            <img src="assets/img/landing/app-showcase-2/hero/layer03.png" alt="Bubble">
                        </div>
                    </div>
                </div>
            </div>

            <div class="order-2 md:order-1 lg:w-xl">
                <div class="lg:mt-25">
                    <h1 class="lg:text-[64px] md:text-[45px] text-4xl font-extrabold text-center md:text-start mb-6">
                        Buy Trade and Store in One App
                    </h1>
                    <p class="lg:block md:hidden block text-lg text-center md:text-start lg:mb-16 md:mb-10 mb-8"> Odio venenatis a, non egestas ut ultrices ultrices quis orci ipsum eu tellus tempor sed amet mauris pellentesque ut vitae. </p>

                    <div class="md:flex gap-6 justify-center md:justify-start lg:mt-0 md:mt-15">
                        <a href="#" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center">
                            <img src="assets/img/market/appstore-light.svg" class="block dark:hidden w-31" alt="App Store">
                            <img src="assets/img/market/appstore-dark.svg" class="hidden dark:block w-31" alt="App Store">
                        </a>
                        <a href="#" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center">
                            <img src="assets/img/market/googleplay-light.svg" class="block dark:hidden w-34" alt="Google Play">
                            <img src="assets/img/market/googleplay-dark.svg" class="hidden dark:block w-34" alt="Google Play">
                        </a>
                    </div>
                </div>

                <div class="md:hidden lg:flex gap-8 justify-center lg:justify-start lg:mt-40 lg:divide-x lg:divide-default-200">
                    <div class="flex items-center w-full">
                        <div class="md:text-[40px] text-[28px] font-bold text-default-900">23k+</div>
                        <div class="ms-3">downloads of the application</div>
                    </div>
                    <div class="flex items-center w-full">
                        <div class="md:text-[40px] text-[28px] font-bold text-default-900">13b+</div>
                        <div class="ms-3">trading volume per every day</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
