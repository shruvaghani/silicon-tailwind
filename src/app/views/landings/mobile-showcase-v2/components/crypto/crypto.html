<section class="bg-dark lg:py-24 md:py-14 py-12 relative">
    <div class="absolute top-0 left-0 w-full h-full bg-white/4"></div>
    <div class="container">
        <div class="flex flex-col md:gap-y-8 gap-y-3">
            <div class="text-center max-w-2xl mx-auto mb-8">
                <h2 class="text-[28px] md:text-[40px] text-white font-bold mb-6">Buy crypto at true cost</h2>
                <p class="text-lg text-white/70"> Egestas ullamcorper posuere tortor eget netus elementum dui eu cras eros accumsan, ullamcorper tortor gula dui in netus </p>
            </div>

            <div class="grid lg:grid-cols-1 md:grid-cols-2 lg:gap-0 md:gap-8 gap-y-4">
                @for (crypto of cryptoListData; track $index) {
                <div class="grid lg:grid-cols-7 items-center w-full lg:gap-10 lg:border-b lg:border-white/14">
                    <div class="lg:col-span-2 inline-flex items-center py-4 lg:py-6 border-b border-white/14 lg:border-b-0">
                        <img [src]="crypto.icon" class="w-8" [alt]="crypto.name" />
                        <div class="ps-3">
                            <h3 class="md:text-2xl text-xl text-white font-extrabold mb-0">
                                {{ crypto.name }}
                                <span class="inline-block opacity-60 ms-3">{{ crypto.symbol }}</span>
                            </h3>
                        </div>
                    </div>

                    <div class="lg:text-end py-4 lg:py-6 border-b border-white/14 lg:border-b-0 text-white font-extrabold md:ext-2xl text-xl">
                        {{ crypto.price }}
                    </div>

                    <div class="lg:text-end py-4 lg:py-6 border-b border-white/14 lg:border-b-0 text-lg" [class]="crypto.changeColor">
                        {{ crypto.change }}
                    </div>

                    <div class="lg:text-start py-4 lg:py-6 border-b border-white/14 lg:border-b-0 text-lg text-white">
                        {{ crypto.marketCap }}
                    </div>

                    <div class="py-4 lg:py-6 lg:border-b-0 flex lg:justify-end">
                       <img [src]="crypto.graph" class="w-27" [alt]="crypto.symbol + ' graph'" />
                    </div>

                    <div class="py-4 lg:py-6 flex lg:justify-end">
                        <button class="text-sm w-full lg:w-auto px-5 py-2 border border-white/14 font-semibold rounded text-default-300 hover:bg-white hover:text-default-800 transition">
                            Trade
                        </button>
                    </div>
                </div>
                }
            </div>
        </div>
    </div>
</section>
