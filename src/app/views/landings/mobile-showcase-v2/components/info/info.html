<section>
    <div class="container border-b border-default-200 dark:border-white/14 lg:py-24 md:py-16 py-12">
        <div class="grid md:grid-cols-3 grid-cols-1 lg:gap-x-20 gap-x-10 gap-y-5">
            @for (item of supportCardsData; track $index) {
            <div class="flex md:block lg:flex items-start mb-3 md:mb-0">

                <div class="inline-flex">
                    <div class="bg-primary flex justify-center items-center text-white shadow-lg rounded-md mb-4 size-12">
                        <img [src]="item.icon" class="size-6" alt="Icon">
                    </div>
                </div>

                <div class="lg:ps-8 md:ps-0 ps-6">
                    <h3 class="md:text-2xl text-xl font-extrabold mb-2 md:mb-4">
                        {{ item.title }}
                    </h3>

                    <p class="mb-2.5 md:mb-4.5">
                        {{ item.description }}
                    </p>

                    <a [routerLink]="[]" class="inline-flex gap-2 items-center text-primary group-hover:text-primary-hover transition-all duration-300 text-sm font-bold rounded-lg">
                        {{ item.buttonText }}

                        <iconify-icon icon="tabler:arrow-right" class="font-bold" height="16" width="16">
                        </iconify-icon>
                    </a>
                </div>

            </div>
            }
        </div>
    </div>
</section>
