<section class="lg:py-20 md:py-16 py-14">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 gap-6">
            <div class="md:col-span-5 bg-gradient-to-r from-indigo-500/10 via-violet-500/10 to-pink-500/10 dark:bg-white/4 rounded-md lg:py-12 lg:px-18 md:px-8 p-6 flex items-center justify-center">
                <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">What Our Students Say About Online Courses</h2>
            </div>
            <div class="md:col-span-7 bg-white dark:bg-white/4 rounded-md shadow-custom lg:p-12 p-6">
                <div class="flex justify-between mb-8">
                    <span class="flex items-center justify-center size-13 bg-primary text-white rounded-md ">
                        <lucide-icon name="quote" fill="white" class="size-5"></lucide-icon>
                    </span>
                    <div class="flex gap-4 md:justify-start justify-center">
                        <button type="button" id="testimonials-prev" aria-label="Previous" class="flex items-center justify-center size-9 rounded-full text-black dark:text-white bg-white dark:bg-white/5 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                            <iconify-icon icon="lucide:chevron-left" class="text-lg font-extrabold"></iconify-icon>
                        </button>
                        <button type="button" id="testimonials-next" aria-label="Next" class="flex items-center justify-center size-9 rounded-full text-black dark:text-white bg-white dark:bg-white/5 shadow-custom hover:bg-primary hover:text-white transition-all duration-300">
                            <iconify-icon icon="lucide:chevron-right" class="text-lg font-extrabold"></iconify-icon>
                        </button>
                    </div>
                </div>
                <div class="swiper w-auto">
                    <swiper-container class="swiper-wrapper lg:mb-14 md:mb-8 mb-10" space-between="24" loop="true" pagination="true" pagination-el=".swiper-pagination" pagination-clickable="true" navigation="true" navigation-prev-el="#testimonials-prev" navigation-next-el="#testimonials-next">
                        @for (testimonial of testimonialsData; track $index) {
                        <swiper-slide class="h-auto">
                            <figure class="bg-transparent grid gap-4">
                                <blockquote class="mb-4.5" [attr.data-depth]="testimonial.depth || 0.5">
                                    <p class="text-lg leading-relaxed">{{ testimonial.quote }}</p>
                                </blockquote>
                                <figcaption class="flex items-center gap-3" [attr.data-depth]="(testimonial.depth || 0.5) * 0.8">
                                    <img [src]="testimonial.image" class="size-15 rounded-full" [alt]="testimonial.name">
                                    <div>
                                        <h6 class="font-semibold">{{ testimonial.name }}</h6>
                                        <span class="text-sm text-default-500 dark:text-white/80">{{ testimonial.role }}</span>
                                    </div>
                                </figcaption>
                            </figure>
                        </swiper-slide>
                        }
                    </swiper-container>
                    <div class="swiper-pagination"></div>
                </div>
            </div>
        </div>
    </div>
</section>
