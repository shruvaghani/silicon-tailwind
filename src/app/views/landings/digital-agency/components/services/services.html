<section class="lg:mx-0 md:mx-6 mx-2">
    <div class="container bg-secondary dark:bg-white/4 lg:py-24 md:py-18 py-12 rounded-md">
        <div class="text-center mb-10">
            <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold mb-6">Our Competencies</h2>
            <p class="text-lg lg:w-2xl md:w-md mx-auto">We fully understand your business. If you need to update something, we are more than happy to help you with the services we are providing.</p>
        </div>

        <div class="hs-accordion-group flex flex-col gap-y-4 lg:w-3xl md:w-xl mx-auto">
            <div class="hs-accordion-group flex flex-col gap-y-4 lg:w-3xl md:w-xl mx-auto">
                @for (item of servicesData; track $index) {
                <div class="hs-accordion bg-white dark:bg-white/5 shadow-custom rounded-md" [id]="'heading-' + $index">

                    <button class="hs-accordion-toggle text-xl inline-flex items-center justify-between gap-x-3 w-full font-semibold text-start py-4 px-6 text-default-950" aria-expanded="true" [attr.aria-controls]="'collapse-' + $index">
                        {{ item.title }}
                        <div>
                            <div class="size-9 bg-secondary dark:bg-white/4 rounded-full hs-accordion-active:bg-primary hs-accordion-active:shadow-custom flex items-center justify-center">

                                <lucide-icon name="chevron-down" class="hs-accordion-active:hidden text-default-950 block size-4">
                                </lucide-icon>

                                <lucide-icon name="chevron-up" class="hs-accordion-active:block hidden text-white size-4">
                                </lucide-icon>

                            </div>
                        </div>
                    </button>

                    <div [id]="'collapse-' + $index" class="hs-accordion-content hidden w-full overflow-hidden transition-[height] duration-300" role="region" [attr.aria-labelledby]="'heading-' + $index">
                        <div class="px-6 pb-4">
                            <div class="md:flex items-center gap-10">
                                <img [src]="item.image" [alt]="item.title" class="w-50">
                                <p>
                                    {{ item.description }}
                                </p>
                            </div>
                        </div>

                    </div>
                </div>
                }
            </div>
        </div>
    </div>
</section>
