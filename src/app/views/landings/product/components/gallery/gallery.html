<section class="lg:pb-24 md:pb-18 pb-12">
    <div class="text-center mb-12">
        <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">
            User shots gallery
        </h2>
    </div>
    <div class="swiper">
        <swiper-container class="swiper-wrapper" [config]="swiperConfig" init="false">

            <!-- Item -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/01.jpg" alt="Gallery image" class="rounded-xl shadow-xl">
            </swiper-slide>

            <!-- Item -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/02.jpg" alt="Gallery image" class="rounded-xl shadow-xl">
            </swiper-slide>

            <!-- Item -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/03.jpg" alt="Gallery image" class="rounded-xl shadow-xl">
            </swiper-slide>
        </swiper-container>
    </div>

    <div class="swiper md:mt-6 mt-2" dir="rtl">
        <swiper-container class="swiper-wrapper" [config]="swiperConfig" init="false">
            <!-- Slide -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/04.jpg" alt="Gallery image" class="rounded-xl shadow-xl" />
            </swiper-slide>
            <!-- Slide -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/05.jpg" alt="Gallery image" class="rounded-xl shadow-xl" />
            </swiper-slide>
            <!-- Slide -->
            <swiper-slide>
                <img src="assets/img/landing/product/gallery/06.jpg" alt="Gallery image" class="rounded-xl shadow-xl" />
            </swiper-slide>
        </swiper-container>
    </div>
</section>
