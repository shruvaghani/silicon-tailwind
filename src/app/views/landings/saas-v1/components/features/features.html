<section class="lg:py-24 md:py-14 py-10">
  <div class="container">
    <div class="text-center lg:mb-16 mb-10">
      <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold">
        Stay Organized & Connected
      </h2>
    </div>

    <div class="grid lg:grid-cols-4 md:grid-cols-3 grid-cols-1 md:gap-x-6 lg:gap-y-13 gap-y-10">
      @for (item of featureData; track $index) {
        <div class="text-center">
          <div
            class="bg-secondary dark:bg-white/4 rounded-full flex justify-center items-center size-16 mb-6 mx-auto"
          >
            <img [src]="item.image" class="w-8" alt="Icon" />
          </div>

          <h3 class="text-xl font-extrabold mb-3">
            {{ item.title }}
          </h3>

          <p class="text-sm">
            {{ item.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
