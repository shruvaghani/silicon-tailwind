<section class="lg:py-24 md:py-16 py-14 bg-secondary dark:bg-white/3">
  <div class="container">
    <div class="grid md:grid-cols-2 grid-cols-1 gap-6">
      <div class="bg-dark rounded-md lg:p-12 p-6">
        <h2 class="lg:text-[80px] md:text-6xl text-[40px] font-extrabold text-white mb-4">420k</h2>
        <p class="font-bold md:text-2xl text-xl text-white mb-5">
          <span class="opacity-60">users are taking advantage of our</span
          ><span class="fw-bold">Task Manager Tool</span
          ><span class="opacity-60"
            >. It’s a new transparent and efficient way to organize all of your daily tasks.
          </span>
        </p>
      </div>

      <div class="bg-white dark:bg-white/4 rounded-md shadow-xl lg:p-12 p-6">
        <div class="flex justify-between mb-8">
          <span class="flex items-center justify-center size-13 bg-primary text-white rounded-md">
            <lucide-icon name="quote" fill="white" class="size-5"></lucide-icon>
          </span>
          <div class="flex gap-4 md:justify-start justify-center">
            <button
              type="button"
              id="testimonials-prev"
              aria-label="Previous"
              class="flex items-center justify-center size-9 rounded-full text-black dark:text-white bg-white dark:bg-white/5 shadow-custom hover:bg-primary hover:text-white transition-all duration-300"
            >
              <iconify-icon
                icon="lucide:chevron-left"
                class="text-lg font-extrabold"
              ></iconify-icon>
            </button>
            <button
              type="button"
              id="testimonials-next"
              aria-label="Next"
              class="flex items-center justify-center size-9 rounded-full text-black dark:text-white bg-white dark:bg-white/5 shadow-custom hover:bg-primary hover:text-white transition-all duration-300"
            >
              <iconify-icon
                icon="lucide:chevron-right"
                class="text-lg font-extrabold"
              ></iconify-icon>
            </button>
          </div>
        </div>

        <div class="swiper w-auto">
          <swiper-container
            space-between="24"
            loop="true"
            pagination="true"
            pagination-el=".swiper-pagination"
            pagination-clickable="true"
            navigation="true"
            navigation-prev-el="#testimonials-prev"
            navigation-next-el="#testimonials-next"
            class="lg:mb-14 md:mb-8 mb-10"
          >
            @for (item of testimonialData; track $index) {
              <swiper-slide class="h-auto">
                <figure class="bg-transparent grid gap-4">
                  <blockquote class="mb-4.5">
                    <p class="text-lg leading-relaxed">
                      {{ item.description }}
                    </p>
                  </blockquote>

                  <figcaption class="flex items-center gap-3">
                    <img
                      [src]="item.authorImage"
                      class="size-15 rounded-full"
                      [alt]="item.authorName"
                    />

                    <div>
                      <h6 class="font-semibold">
                        {{ item.authorName }}
                      </h6>

                      <span class="text-sm text-default-500 dark:text-white/80">
                        {{ item.authorDesignation }}
                      </span>
                    </div>
                  </figcaption>
                </figure>
              </swiper-slide>
            }
          </swiper-container>
          <div class="swiper-pagination"></div>
        </div>
      </div>
    </div>
  </div>
</section>
