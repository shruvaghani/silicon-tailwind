<section class="relative overflow-hidden py-12 bg-cover bg-no-repeat bg-center bg-[url('assets/img/landing/saas-3/hero/hero-bg.jpg')]">
        <div class="relative z-20 container lg:py-18 md:pt-12 pt-10 text-white">
            <div class="grid grid-cols-1 md:grid-cols-12 items-start md:gap-6">
                <div class="lg:col-span-5 col-span-6 lg:pt-12 py-6 md:text-start text-center">
                    <h1 class="lg:text-[64px] md:text-5xl text-4xl font-extrabold md:mb-8 mb-6 text-white">
                        Make Your Life Even Easier with Crypto Bank
                    </h1>

                    <p class="text-lg md:hidden lg:block md:mb-12 mb-8 text-white/70"> Odio venenatis a, non egestas ut ultrices ultrices quis orci ipsum eu tellus tempor sed amet mauris pellentesque ut vitae.</p>

                    <div class="flex justify-center md:justify-start">
                        <a [routerLink]="[]" class="inline-block lg:w-auto w-full bg-primary  text-white py-3.5 lg:px-8 md:px-6 font-bold hover:!shadow-none rounded-md transition-all hover:bg-primary-hover md:me-6 me-4">Start
                            trial now
                        </a>
                        <a [routerLink]="[]" class="lg:w-auto w-full py-3.5 lg:px-8 md:px-6 text-center border border-white/20 font-semibold rounded-md text-white/80 hover:text-dark hover:bg-white transition-all">
                            Contact us
                        </a>
                    </div>

                    <div class="flex items-center justify-center gap-4 md:justify-start text-start lg:mt-24 mt-8">
                        <div class="flex -gap-x-2">
                            <img class="inline-block size-12 rounded-full ring-2 ring-dark" src="assets/img/avatar/14.jpg" alt="Avatar">
                            <img class="inline-block size-12 rounded-full ring-2 ring-dark" src="assets/img/avatar/08.jpg" alt="Avatar">
                            <img class="inline-block size-12 rounded-full ring-2 ring-dark" src="assets/img/avatar/15.jpg" alt="Avatar">

                            <strong>400k+</strong> users already with us
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 col-span-6 lg:ms-26 lg:w-168 md:w-96 lg:pt-0 md:pt-8">
                    <div class="relative" appParallax>
                        <div class="relative z-20 parallax-layer" data-depth="0.1">
                            <img src="assets/img/landing/saas-3/hero/layer01.png" alt="Card">
                        </div>

                        <div class="absolute z-30 top-0 start-0 parallax-layer" data-depth="0.25">
                            <img src="assets/img/landing/saas-3/hero/layer02.png" alt="Bubble">
                        </div>

                        <div class="absolute top-0 start-0 parallax-layer" data-depth="-0.15">

                    </div>
                </div>
            </div>
