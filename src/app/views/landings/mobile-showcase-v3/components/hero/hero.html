<section class="relative overflow-hidden z-20 md:pt-28 lg:pb-20 md:pb-12 pt-24 pb-9">
  <div class="container">
    <div class="grid md:grid-cols-12 items-center">
      <div class="lg:col-span-5 md:col-span-6 md:order-1 order-2">
        <div class="order-2 md:order-1 lg:w-lg">
          <h1
            class="lg:text-5xl md:text-4xl text-3xl font-extrabold text-center md:text-start lg:mb-6 mb-4"
          >
            Manage your money in one application
          </h1>
          <p class="text-xl text-center md:text-start lg:mb-12 md:mb-10 mb-8">
            We offer you a new generation of the mobile banking. Save, spend, and manage your money
            on the go.
          </p>

          <div class="md:flex gap-6 justify-center md:justify-start">
            <a
              [routerLink]="[]"
              class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center"
            >
              <img
                src="assets/img/market/appstore-light.svg"
                class="block dark:hidden w-31"
                alt="App Store"
              />
              <img
                src="assets/img/market/appstore-dark.svg"
                class="hidden dark:block w-31"
                alt="App Store"
              />
            </a>
            <a
              [routerLink]="[]"
              class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center"
            >
              <img
                src="assets/img/market/googleplay-light.svg"
                class="block dark:hidden w-34"
                alt="Google Play"
              />
              <img
                src="assets/img/market/googleplay-dark.svg"
                class="hidden dark:block w-34"
                alt="Google Play"
              />
            </a>
          </div>
        </div>
      </div>

      <div class="lg:col-span-7 md:col-span-6 md:order-2 order-1">
        <div
          appParallax
          [parallaxScale]="9"
          class="relative lg:ms-auto lg:mx-0 md:ms-auto mx-auto lg:max-w-139 md:max-w-88 max-w-72"
        >
          <div
            class="absolute inset-0 transition-transform duration-200 will-change-transform"
            data-depth="0.1"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer01.png"
              alt="Bubble"
              class="block w-full"
            />
          </div>

          <div
            class="absolute inset-0 transition-transform duration-200 will-change-transform"
            data-depth="-0.2"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer02.png"
              alt="Bubble"
              class="block w-full"
            />
          </div>

          <div
            class="absolute inset-0 transition-transform duration-200 will-change-transform"
            data-depth="-0.3"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer03.png"
              alt="Bubble"
              class="block w-full"
            />
          </div>

          <div
            class="absolute inset-0 transition-transform duration-200 will-change-transform"
            data-depth="0.4"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer04.png"
              alt="Bubble"
              class="block w-full"
            />
          </div>

          <div
            class="absolute inset-0 transition-transform duration-200 will-change-transform"
            data-depth="-0.1"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer05.png"
              alt="Screen"
              class="block w-full"
            />
          </div>

          <div
            class="relative transition-transform duration-200 will-change-transform"
            data-depth="0.2"
          >
            <img
              src="assets/img/landing/app-showcase-3/hero/layer06.png"
              alt="Screen"
              class="block w-full"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
