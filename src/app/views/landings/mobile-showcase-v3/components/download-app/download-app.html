<section class="dark:bg-white/3 lg:pb-0 md:pb-10 pb-6">
        <div class="grid lg:grid-cols-12 items-center">
            <div class="lg:col-span-5 px-4">
                <div class="lg:w-md md:w-lg lg:ms-auto lg:mx-0 mx-auto">
                    <h1 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold text-center lg:text-start lg:mb-6 mb-4">
                        Download <span class="text-primary">Silicon</span>app
                    </h1>
                    <p class="text-lg text-center lg:text-start lg:mb-12 md:mb-8 mb-6">
                        Take control of your finances and download our mobile app today! Start tracking your expenses, budgeting wisely, and achieving your financial goals with ease. Don't wait, take the first step towards financial freedom now!
                    </p>
                    <div class="md:flex gap-6 justify-center lg:justify-start">
                        <a [routerLink]="[]" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center">
                            <img src="assets/img/market/appstore-light.svg" class="block dark:hidden w-31" alt="App Store">
                            <img src="assets/img/market/appstore-dark.svg" class="hidden dark:block w-31" alt="App Store">
                        </a>
                        <a [routerLink]="[]" class="bg-black dark:bg-indigo-50 dark:hover:bg-indigo-200 transition-all duration-200 dark:text-white text-white rounded-lg px-4 py-2 mb-4 flex items-center justify-center">
                            <img src="assets/img/market/googleplay-light.svg" class="block dark:hidden w-34" alt="Google Play">
                            <img src="assets/img/market/googleplay-dark.svg" class="hidden dark:block w-34" alt="Google Play">
                        </a>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-7">
                <div class="lg:block hidden lg:w-4xl lg:ms-auto">
                    <img src="assets/img/landing/app-showcase-3/screens.png" width="900" alt="Mobile app screens">
                </div>
            </div>
        </div>
    </section>
