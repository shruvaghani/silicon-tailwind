 <section class="lg:py-24 md:py-18 py-12">
        <div class="container">
            <div class="grid lg:grid-cols-12 lg:gap-0 gap-y-12">
                <div class="lg:col-span-5">
                    <div class="lg:text-start text-center">
                        <h2 class="lg:text-[40px] md:text-[33px] text-[28px] font-extrabold lg:mb-16 mb-8 lg:w-md">We need your <span class="text-primary">support!</span> Become a backer on Kickstarter now and get some <span class="text-primary">benefits</span></h2>
                        <div class="lg:mt-12 md:mt-0 mt-7">
                            <a [routerLink]="[]" class="inline-flex md:w-auto w-full gap-2 items-center justify-center px-8 py-3 text-white bg-primary hover:bg-primary-hover transition-all duration-300 font-semibold rounded-lg">
                                Back us on Kickstarter
                                <iconify-icon icon="tabler:arrow-right" class="font-bold size-4"></iconify-icon>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7">
                    <div class="lg:w-xl lg:ms-auto">
                        <div class="grid md:grid-cols-2 grid-cols-1 gap-12">
                            @for (benefit of benefitsData; track $index) {
                                <div class="md:text-start text-center">
                                    <img [src]="benefit.image" [alt]="benefit.alt" class="w-15 md:mx-0 mx-auto mb-6">
                                    <h3 class="md:text-2xl text-xl mb-2 font-extrabold">{{ benefit.title }}</h3>
                                    <p class="text-lg">{{ benefit.description }}</p>
                                </div>
                            }
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
