<section class="lg:pb-24 md:pb-18 pb-12">
    <div class="container">
        <div class="grid md:grid-cols-3 grid-cols-1 lg:gap-x-16 md:gap-x-8 gap-y-8">
            @for (feature of featuresData; track feature.title) {
                <div class="text-center">
                    <img [src]="feature.icon" [alt]="feature.alt" class="w-17.5 mx-auto mb-6">
                    <h3 class="md:text-2xl text-xl mb-2 font-extrabold">{{ feature.title }}</h3>
                    <p class="text-lg">{{ feature.description }}</p>
                </div>
            }
        </div>
    </div>
</section>
