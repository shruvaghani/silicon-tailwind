<section class="lg:py-30 md:py-16 py-12 bg-[linear-gradient(360deg,#fff_5.39%,#f3f6ff_78.66%)] dark:bg-[linear-gradient(360deg,#0b0f19_5.39%,rgba(255,255,255,0.04)_78.66%)]">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1 gap-6 items-center">
            <div class="md:col-span-5 col-span-1">
                <h2 class="lg:text-[40px] md:text-[33px] text-default-900 font-extrabold text-[28px] mb-4 lg:w-md w-auto"> Learn <span class="bg-[linear-gradient(to_right,#6366f1,#8b5cf6,#d946ef)] bg-clip-text text-transparent">how Silicon works</span> in a nutshell. Watch a short introductory video</h2>
            </div>

            <div class="md:col-span-7 col-span-1">
                <div class="relative group">
                    <div class="absolute top-0 start-0 size-full flex items-center justify-center z-50">
                        <lightgallery [settings]="settings">
                            <a href="https://www.youtube.com/watch?v=udMULpKcnn8" aria-label="Play video" class="inline-flex items-center justify-center size-18 text-gray-800 bg-white group-hover:bg-primary group-hover:text-white transition duration-200 rounded-full group-hover:!">
                                <iconify-icon icon="tabler:player-play-filled" class="text-lg"></iconify-icon>
                            </a>
                        </lightgallery>
                    </div>
                    <img src="assets/img/landing/saas-5/video-cover-light.jpg" class="block dark:hidden rounded-md" alt="Video cover">
                    <img src="assets/img/landing/saas-5/video-cover-dark.png" class="hidden dark:block rounded-md" alt="Video cover">
                </div>
            </div>
        </div>
    </div>
</section>
